<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourBlog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900 dark:bg-gray-950 dark:text-gray-100 font-sans transition-colors duration-300">
     <nav class="bg-white dark:bg-gray-900 sticky ">
    <!-- we use a div inside navbar as we need to use flex prob
    inside the div inorder to center the items with toggle -->
       <div class="max-w-5xl mx-auto px-4 flex items-center justify-between">
             <h1 class="text-2xl font-bold mt-4 bg-gradient-to-r from-blue-600 to-indigo-500 bg-clip-text text-transparent">
                     YourBlog        
             </h1>
          <!-- this div is for toglle one  -->
             <div class=" flex items-center mt-5 gap-4">
                 <button onclick="toggleTheme()" class="p-2 cursor-pointer rounded bg-gray-100 dark:bg-gray-800 transition">
                    <span id="theme-icon-sun" class="hidden dark:block">☀️</span>
                    <span id="theme-icon-moon" class="block dark:hidden">🌙</span>
                 </button>
                 <button onclick="toggleForm()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition text-sm font-medium">
                    + New Post
                </button>
             </div>

       </div>
     </nav>
     <!-- now the main blogs part inside we have the new content part and then grid part -->
     <main class="max-w-5xl mx-auto px-4 py-8">
      
         <input id="search" type="text" placeholder="Search posts..."
  class="w-full mb-6 p-3 border rounded-lg dark:bg-gray-800 dark:border-gray-700"/>
  <!-- //this is for adding the domain tabs initially ill keep empty and add in js  -->
  <div id="domain-tabs" class="flex gap-6 border-b mb-6 text-sm font-medium"></div>
  <div class="gap-3 mb-6">
    <!-- this for storing the bookmarked blogs -->
     <button onclick="showall()" class="px-4 py-2 hover:bg-gray-600 rounded-lg bg-blue-600 text-white">
SHOW ALL POSTS
     </button>
    <button onclick="showbookmarks()"
class="px-4 py-2 rounded-lg bg-indigo-600 text-white">
READ LATER
</button>
  </div>
       <section id="form-con" class="hidden mb-12  bg-white dark:bg-gray-900 p-6 rounded-xl ">
                  <h2 class="text-xl font-bold">
                    Create a new blog
                  </h2>
         <!-- add this for good spacing btw child elements -->
             <div class="space-y-4">
                <input type="text" id="btitle" placeholder="Enter title" class="w-full  dark:bg-gray-800 p-3 rounded focus:ring-2 focus:ring-indigo-500 border">
                <textarea id="blog-content" rows="4" placeholder="Write your heart out..." class="w-full p-3 border dark:border-gray-700 dark:bg-gray-800 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                <div class=" flex gap-5">
                       <button onclick="addpost()" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 font-semibold">
                        Publish
                       </button>
                       <button onclick="gen()" class="bg-blue-600 px-6 py-2 text-white rounded-lg hover:bg-gray-800">
                          ✨ Generate
                       </button>
                       <button onclick="toggleForm()" class="bg-gray-200 dark:bg-gray-700 dark:text-gray-200 px-6 py-2 font-bold rounded ">Cancel</button>
                </div>
             </div>
       </section>
       <!-- this is for storing alr avaliable blogs -->
       <div id="blog-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>

     </main>
    <!-- now here we open the full popup window where when we want
    to see the full content when we click -->
    <div id="pmodal" class="fixed inset-0 backdrop-blur-sm
 bg-black/60 hidden flex items-center justify-center z-50">
    <div class="bg-white overflow-y-auto max-h-[80vh] dark:bg-gray-900 rounded-2xl p-8 max-w-xl w-full shadow-2xl">
       <button onclick="closemodal()" class="text-gray-500 hover:text-red-500 text-3xl">&times;</button>
       <article id="modal-content"></article>
    </div>
</div>
<!-- i need like credits in left side and then the follow page in right side  
 so we can create a div inside that and use flex row and then for left and right justify between-->
<footer class= "mt-15 border-gray-200 dark:border-gray-800 border-t ">
  <div class="mx-auto max-w-5xl px-4 py-8 flex items-center justify-between gap-4">
    <!-- this is for left part -->
     <p class="text-large text-gray-600 dark:text-gray-400">
         Developed By <span class="font-bold">Deekshith KM</span>
     </p>
     

     </p>
     <!-- for right part -->
      
      <div class="flex items-center gap-5">
        <a href="https://github.com/yourusername" target="_blank"
         aria-label="GitHub"
         class="text-gray-600 dark:text-gray-400 hover:text-black dark:hover:text-white transition-transform hover:scale-110">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 .5C5.65.5.5 5.8.5 12.3c0 5.2 3.4 9.6 8.2 11.2.6.1.8-.3.8-.6v-2.3c-3.3.7-4-1.4-4-1.4-.5-1.3-1.2-1.7-1.2-1.7-1-.7.1-.7.1-.7 1.1.1 1.7 1.2 1.7 1.2 1 .1.7 2.1 2.8 1.6.1-.7.4-1.2.7-1.5-2.7-.3-5.6-1.4-5.6-6.3 0-1.4.5-2.6 1.2-3.5-.1-.3-.5-1.7.1-3.6 0 0 1-.3 3.4 1.3a11.7 11.7 0 0 1 6.2 0c2.4-1.6 3.4-1.3 3.4-1.3.6 1.9.2 3.3.1 3.6.8.9 1.2 2.1 1.2 3.5 0 4.9-2.9 6-5.7 6.3.4.3.8 1 .8 2v3c0 .3.2.7.8.6 4.8-1.6 8.2-6 8.2-11.2C23.5 5.8 18.3.5 12 .5z"/>
        </svg>
      </a>
       <a href="https://instagram.com/_deekshith_km" target="_blank"
         aria-label="Instagram"
         class="text-gray-600 dark:text-gray-400 hover:text-black-500 transition-transform hover:scale-110">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
          <path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 
          0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7zm5 5.2A4.8 4.8 
          0 1 1 7.2 12 4.8 4.8 0 0 1 12 7.2zm6.3-.9a1.1 
          1.1 0 1 1-2.2 0 1.1 1.1 0 0 1 2.2 0zM12 
          9a3 3 0 1 0 3 3 3 3 0 0 0-3-3z"/>
        </svg>
      </a>


      </div>

  </div>
</footer>



    <script src="blogg.js"></script>

</body>
</html>
